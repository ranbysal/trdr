bot:
  enabled: true
  source_bot: prop_v2
  alert_tag: "[EXEC-V3]"
  dataset: GLBX.MDP3
  schema: ohlcv-1m
  stype_in: continuous
  signal_queue_path: out/prop_v2/execution_signals.ndjson
  sqlite_path: state/executor_v3/paper_ledger.db
  freshness_seconds: 180
  paper_mode: true

runtime:
  databento_symbols:
    - NQ.v.0
    - YM.v.0
    - GC.v.0
    - SI.v.0
  heartbeat_interval_hours: 4.0
  bars_stale_after_s: 180.0

sizing:
  default_contracts: 1
  contracts_by_instrument:
    NQ: 1
    YM: 1
    GC: 1
    SI: 1
  risk_per_trade_percent:
  account_size: 150000
  point_value_by_instrument:
    NQ: 20.0
    YM: 5.0
    GC: 10.0
    SI: 50.0
